<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://cdn.boxicons.com/fonts/basic/boxicons.min.css' rel='stylesheet'>
    <link href='https://cdn.boxicons.com/fonts/brands/boxicons-brands.min.css' rel='stylesheet'>
    
</head>
<body>
    <div class="app">

        <div class="search">
            <input type="text" placeholder="Search" spellcheck="false">
            <button class="search-btn">
                <i id="btn" class='bxr  bx-search button'></i>
            </button>
        </div>

        <div class="weather">
            <img src="weather-app-imgs/sunny.png" alt="weather-icons" class="weather-icon">
            <h1 class="temprature">0°C</h1>
            <h2 class="cityName">Search</h2>
        </div>

        <div class="details">
            <div class="col">
                <img src="weather-app-imgs/humidity.png" alt="humidity">
                <div>
                    <p class="humidity">0%</p>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="col">
                <img src="weather-app-imgs/windy.png" alt="wind-speed">
                <div>
                    <p class="wind">0 km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
